services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: netscan
      # CHANGE THIS in production (or override via an .env file).
      POSTGRES_PASSWORD: ${NETSCAN_DB_PASSWORD:-netscan}
      POSTGRES_DB: netscan
    ports:
      - "${NETSCAN_DB_PORT:-5432}:5432"
    volumes:
      - netscan_pg:/var/lib/postgresql/data
    restart: unless-stopped

  relay:
    # Varsayılan: hazır çok-mimarili imaj (amd64 + arm64/Raspberry Pi) — sıfırdan derleme yok.
    image: ghcr.io/dogukangecko/netnazar-relay:latest
    # Kaynaktan derlemek isterseniz üstteki image satırını silip aşağıdakini açın
    # (ve `docker compose up -d --build` çalıştırın):
    # build: { context: ., dockerfile: docker/relay.Dockerfile }
    depends_on: [db]
    environment:
      NETSCAN_DATABASE_URL: postgres://netscan:${NETSCAN_DB_PASSWORD:-netscan}@db:5432/netscan
      NETSCAN_BIND: 0.0.0.0:8080
    ports:
      - "${NETSCAN_RELAY_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  netscan_pg:
