<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NetNazar 🧿</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
    --fg: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --amber: #d29922;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.5; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 16px;
    display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 1.2rem; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  main { max-width: 1000px; margin: 0 auto; padding: 16px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  h2 { font-size: 1rem; margin: 0 0 12px; color: var(--fg); }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin: 8px 0 4px; }
  input, button { font: inherit; color: var(--fg); background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 12px; width: 100%; }
  button { background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 600; margin-top: 12px; }
  button:hover { filter: brightness(1.1); }
  button.ghost { background: var(--bg3); color: var(--fg); border: 1px solid var(--border);
    width: auto; margin-top: 0; padding: 6px 12px; font-weight: 500; }
  select.lang { font: inherit; color: var(--fg); background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; width: auto; cursor: pointer; }
  .err { color: var(--red); font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th, td { text-align: start; padding: 8px 10px; border-bottom: 1px solid var(--border);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
  tr:last-child td { border-bottom: none; }
  .table-wrap { overflow-x: auto; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
  .pill.on { background: rgba(63,185,80,.15); color: var(--green); }
  .pill.off { background: rgba(139,148,158,.15); color: var(--muted); }
  .pill.open { background: rgba(248,81,73,.15); color: var(--red); }
  .pill.closed { background: rgba(63,185,80,.15); color: var(--green); }
  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .metric { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 12px; text-align: center; }
  .metric .val { font-size: 1.5rem; font-weight: 700; }
  .metric .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .net-item { padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px;
    cursor: pointer; background: var(--bg3); }
  .net-item:hover { border-color: var(--accent); }
  .net-item.sel { border-color: var(--accent); background: rgba(88,166,255,.08); }
  .net-item .name { font-weight: 600; }
  .net-item .sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .muted { color: var(--muted); font-size: 0.88rem; }
  .hidden { display: none; }
  .ev-msg { white-space: normal; max-width: none; }
  @media (max-width: 600px) { th, td { max-width: 140px; } }
</style>
</head>
<body>
<header>
  <h1>NetNazar 🧿</h1>
  <div class="spacer"></div>
  <select id="lang" class="lang" aria-label="Language"></select>
  <button id="logoutBtn" class="ghost hidden" data-i18n="logout">Log out</button>
</header>

<main>
  <!-- Login -->
  <section id="loginView" class="card hidden">
    <h2 data-i18n="login_title">Sign in</h2>
    <label for="email" data-i18n="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@example.com">
    <label for="password" data-i18n="password">Password</label>
    <input id="password" type="password" autocomplete="current-password">
    <button id="loginBtn" data-i18n="login_btn">Sign in</button>
    <div id="loginErr" class="err"></div>
  </section>

  <!-- Dashboard -->
  <section id="dashView" class="hidden">
    <div class="card">
      <h2 data-i18n="networks">Networks</h2>
      <div id="netList"><p class="muted" data-i18n="loading">Loading…</p></div>
    </div>

    <div id="detail" class="hidden">
      <div class="card">
        <h2 data-i18n="metrics_title">Internet metrics (latest)</h2>
        <div class="metrics-grid">
          <div class="metric"><div id="mRtt" class="val">—</div><div class="lbl" data-i18n="rtt">RTT (ms)</div></div>
          <div class="metric"><div id="mJitter" class="val">—</div><div class="lbl" data-i18n="jitter">Jitter (ms)</div></div>
          <div class="metric"><div id="mLoss" class="val">—</div><div class="lbl" data-i18n="loss">Loss (%)</div></div>
        </div>
        <p id="mTs" class="muted" style="margin:10px 0 0;"></p>
      </div>

      <div class="card">
        <h2 data-i18n="devices">Devices</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th data-i18n="c_name">Name</th><th>IP</th><th>MAC</th><th data-i18n="c_status">Status</th></tr></thead>
            <tbody id="devBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2 data-i18n="outages_title">Outages (internet)</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th data-i18n="c_start">Start</th><th data-i18n="c_end">End</th><th data-i18n="c_dur">Duration</th><th data-i18n="c_status">Status</th></tr></thead>
            <tbody id="outBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2 data-i18n="events_title">Recent events</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th data-i18n="c_time">Time</th><th data-i18n="c_type">Type</th><th data-i18n="c_msg">Message</th></tr></thead>
            <tbody id="evBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
</main>

  function cell(text) {
    var td = document.createElement("td");
    td.textContent = (text === null || text === undefined || text === "") ? "—" : String(text);
    return td;
  }
  function pillCell(text, cls) {
    var td = document.createElement("td");
    var span = document.createElement("span");
    span.className = "pill " + cls;
    span.textContent = text;
    td.appendChild(span);
    return td;
  }
  function clear(el) { while (el.firstChild) { el.removeChild(el.firstChild); } }

  function showLogin() { hide($("dashView")); hide($("logoutBtn")); show($("loginView")); }
  function showDash() { hide($("loginView")); show($("dashView")); show($("logoutBtn")); loadNetworks(); }
  function doLogout() { token = null; selectedNet = null; localStorage.removeItem(TOKEN_KEY); showLogin(); }

  function doLogin() {
    var email = $("email").value.trim();
    var password = $("password").value;
    $("loginErr").textContent = "";
    if (!email || !password) { $("loginErr").textContent = t("creds_required"); return; }
    fetch("/v1/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, password: password })
    }).then(function (res) {
      if (res.status === 401) { throw new Error(t("bad_creds")); }
      if (!res.ok) { throw new Error(t("login_failed", res.status)); }
      return res.json();
    }).then(function (data) {
      token = data.token;
      localStorage.setItem(TOKEN_KEY, token);
      $("password").value = "";
      showDash();
    }).catch(function (e) { $("loginErr").textContent = e.message; });
  }

  function loadNetworks() {
    var list = $("netList");
    clear(list);
    var p = document.createElement("p"); p.className = "muted"; p.textContent = t("loading");
    list.appendChild(p);
    api("/v1/networks").then(function (nets) {
      clear(list);
      if (!nets.length) {
        var em = document.createElement("p"); em.className = "muted"; em.textContent = t("no_networks");
        list.appendChild(em); return;
      }
      nets.forEach(function (n) {
        var item = document.createElement("div");
        item.className = "net-item";
        if (selectedNet === n.id) { item.classList.add("sel"); }
        var name = document.createElement("div"); name.className = "name";
        name.textContent = n.name || n.subnet || n.id;
        var sub = document.createElement("div"); sub.className = "sub";
        sub.textContent = (n.subnet || "—") + " · " +
          (n.online_count || 0) + "/" + (n.device_count || 0) + " " + t("online") + " · " +
          t("last") + " " + fmtTs(n.last_seen);
        item.appendChild(name); item.appendChild(sub);
        item.addEventListener("click", function () { selectNetwork(n.id); });
        list.appendChild(item);
      });
    }).catch(function (e) {
      clear(list);
      var em = document.createElement("p"); em.className = "err"; em.textContent = e.message;
      list.appendChild(em);
    });
  }

  function selectNetwork(id) {
    selectedNet = id;
    loadNetworks();
    show($("detail"));
    loadMetrics(id); loadDevices(id); loadOutages(id); loadEvents();
  }

  function loadMetrics(id) {
    $("mRtt").textContent = "…"; $("mJitter").textContent = "…"; $("mLoss").textContent = "…"; $("mTs").textContent = "";
    api("/v1/networks/" + encodeURIComponent(id) + "/metrics?target=internet&limit=1").then(function (samples) {
      if (!samples.length) {
        $("mRtt").textContent = "—"; $("mJitter").textContent = "—"; $("mLoss").textContent = "—";
        $("mTs").textContent = t("no_metrics"); return;
      }
      var s = samples[samples.length - 1];
      $("mRtt").textContent = fmtNum(s.rtt_ms);
      $("mJitter").textContent = fmtNum(s.jitter_ms);
      $("mLoss").textContent = fmtNum(s.loss_pct);
      $("mTs").textContent = t("latest_sample", fmtTs(s.ts));
    }).catch(function (e) { $("mTs").textContent = e.message; });
  }

  function loadDevices(id) {
    var body = $("devBody"); clear(body);
    api("/v1/networks/" + encodeURIComponent(id) + "/devices").then(function (devs) {
      clear(body);
      if (!devs.length) {
        var tr = document.createElement("tr"); var td = cell(t("no_devices")); td.colSpan = 4;
        tr.appendChild(td); body.appendChild(tr); return;
      }
      devs.forEach(function (d) {
        var tr = document.createElement("tr");
        tr.appendChild(cell(d.hostname || d.vendor));
        tr.appendChild(cell(d.ip));
        tr.appendChild(cell(d.mac));
        tr.appendChild(d.is_online ? pillCell(t("st_online"), "on") : pillCell(t("st_offline"), "off"));
        body.appendChild(tr);
      });
    }).catch(function (e) {
      clear(body);
      var tr = document.createElement("tr"); var td = cell(e.message); td.colSpan = 4;
      tr.appendChild(td); body.appendChild(tr);
    });
  }

  function loadOutages(id) {
    var body = $("outBody"); clear(body);
    api("/v1/networks/" + encodeURIComponent(id) + "/outages?target=internet").then(function (outs) {
      clear(body);
      if (!outs.length) {
        var tr = document.createElement("tr"); var td = cell(t("no_outages")); td.colSpan = 4;
        tr.appendChild(td); body.appendChild(tr); return;
      }
      outs.forEach(function (o) {
        var tr = document.createElement("tr");
        tr.appendChild(cell(fmtTs(o.started_ts)));
        tr.appendChild(cell(o.ended_ts ? fmtTs(o.ended_ts) : "—"));
        tr.appendChild(cell(fmtDur(o.started_ts, o.ended_ts)));
        tr.appendChild(o.ended_ts ? pillCell(t("st_closed"), "closed") : pillCell(t("st_open"), "open"));
        body.appendChild(tr);
      });
    }).catch(function (e) {
      clear(body);
      var tr = document.createElement("tr"); var td = cell(e.message); td.colSpan = 4;
      tr.appendChild(td); body.appendChild(tr);
    });
  }

  function loadEvents() {
    var body = $("evBody"); clear(body);
    api("/v1/events").then(function (evs) {
      clear(body);
      if (!evs.length) {
        var tr = document.createElement("tr"); var td = cell(t("no_events")); td.colSpan = 3;
        tr.appendChild(td); body.appendChild(tr); return;
      }
      evs.forEach(function (ev) {
        var tr = document.createElement("tr");
        tr.appendChild(cell(fmtTs(ev.ts)));
        tr.appendChild(cell(ev.kind));
        var msg = cell(ev.message); msg.className = "ev-msg";
        tr.appendChild(msg);
        body.appendChild(tr);
      });
    }).catch(function (e) {
      clear(body);
      var tr = document.createElement("tr"); var td = cell(e.message); td.colSpan = 3;
      tr.appendChild(td); body.appendChild(tr);
    });
  }

  // ---- Wire up ----
  var sel = $("lang");
  for (var i = 0; i < LANGS.length; i++) {
    var o = document.createElement("option");
    o.value = LANGS[i][0]; o.textContent = LANGS[i][1];
    sel.appendChild(o);
  }
  applyLang();
  sel.addEventListener("change", function () {
    lang = sel.value;
    applyLang();
    // Görünür verileri yeni dile göre yeniden çiz.
    if (token) { loadNetworks(); if (selectedNet) { loadMetrics(selectedNet); loadDevices(selectedNet); loadOutages(selectedNet); loadEvents(); } }
  });

  $("loginBtn").addEventListener("click", doLogin);
  $("password").addEventListener("keydown", function (e) { if (e.key === "Enter") { doLogin(); } });
  $("logoutBtn").addEventListener("click", doLogout);

  if (token) { showDash(); } else { showLogin(); }
})();
</script>
</body>
</html>
